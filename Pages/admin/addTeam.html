<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/pages/admin/css/admin.css" />
    <!-- <link rel="stylesheet" href="/style.css"> -->
    <title>Adicionar Equipa</title>
  </head>
  <body>
    <header id="header-placeholder"></header>
    <main>
      <button id="logoutBtn">Logout</button>
      <h1>Adicionar Equipa</h1>
      <form class="form" id="addTeamForm">
        <label for="teamName">Nome da Equipa:</label>
        <input type="text" id="teamName" name="teamName" required />

        <label for="teamCountry">País da Equipa:</label>
        <input type="text" id="teamCountry" name="teamCountry" required />

        <label for="teamGroup">Grupo:</label>
        <select name="teamGroup" id="teamGroup">
          <option value="">Seleciona um grupo</option>
          <option value="Grupo A">Grupo A</option>
          <option value="Grupo B">Grupo B</option>
          <option value="Grupo C">Grupo C</option>
          <option value="Grupo D">Grupo D</option>
        </select>

        <label for="teamImage">Logo da Equipa:</label>
        <input
          type="file"
          accept=".jpg, .jpeg, .png"
          id="teamImage"
          name="teamImage"
        />

        <button type="submit" id="addTeamBtn">Adicionar Equipa</button>
        <button type="reset">Reset</button>
      </form>
      <button>
        <a href="/pages/admin/listTeams.html">Voltar para lista</a>
      </button>
    </main>
    <footer id="footer-placeholder"></footer>
    <!--     <script src="/scripts/loadDOM.js"></script>
 -->
    <script type="module" src="/scripts/api.js"></script>
  </body>
</html>

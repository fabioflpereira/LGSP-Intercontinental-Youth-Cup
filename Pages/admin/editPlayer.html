<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/Pages/admin/css/admin.css" />
    <title>EditPlayer</title>
  </head>
  <body>
    <header id="header-placeholder"></header>

    <main>
      <button id="logoutBtn">Logout</button>
      <h1>Editar Jogador</h1>

      <form id="editPlayerForm">
        <!-- Equipa -->
        <label for="teamsDropdown">Equipa:</label>
        <select id="teamsDropdown" name="teamsDropdown" required></select>

        <!-- Nome -->
        <label for="playerName">Nome do Jogador:</label>
        <input type="text" id="playerName" name="playerName" required />

        <!-- Número -->
        <label for="playerNumber">Número:</label>
        <input type="number" id="playerNumber" name="playerNumber" required />

        <!-- Posição -->
        <label for="playerPosition">Posição:</label>
        <select id="playerPosition" name="playerPosition" required>
          <option value="">-- Seleciona --</option>
          <option value="guarda-redes">Guarda-Redes</option>
          <option value="defesa">Defesa</option>
          <option value="medio">Médio</option>
          <option value="avancado">Avançado</option>
        </select>

        <!-- Imagem atual -->
        <label>Foto Atual:</label>
        <img id="playerImg" src="" alt="Foto do jogador" width="100" />

        <!-- Nova imagem -->
        <label for="playerImage">Nova Foto:</label>
        <input
          type="file"
          id="playerImage"
          name="playerImage"
          accept=".jpg,.jpeg,.png"
        />

        <button type="submit" id="editPlayerBtn">
          Guardar Alterações
        </button>
        <button type="reset">Reset</button>
      </form>

      <button>
        <a href="/Pages/admin/listPlayers.html">Voltar para a lista</a>
      </button>
    </main>

    <footer id="footer-placeholder"></footer>

    <script type="module" src="/scripts/api.js"></script>
  </body>
</html>

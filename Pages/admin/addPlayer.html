<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="stylesheet" href="/Pages/admin/css/admin.css">
  <title>Adicionar Jogador</title>
</head>
<body>

  <header id="header-placeholder"></header>

  <main>
    <button id="logoutBtn">Logout</button>
    <h1>Adicionar Jogador</h1>

    <form class="form" id="addPlayerForm">
      <label for="teamsDropdown">Equipa:</label>
      <select id="teamsDropdown" name="teamsDropdown" required>
      </select>
      <br><br>

      <label for="playerName">Nome do Jogador:</label>
      <input type="text" id="playerName" name="playerName" required />
      <br><br>

      <label for="playerNumber">Número:</label>
      <input type="number" id="playerNumber" name="playerNumber" required />
      <br><br>

      <label for="playerImage">Foto:</label>
      <input type="file" id="playerImage" name="playerImage" accept=".jpg,.jpeg,.png" />
      <br><br>

      <button type="submit" id="addPlayerBtn">Adicionar Jogador</button>
      <button type="reset">Reset</button>
      <button>
        <a href="/Pages/admin/listPlayers.html">Voltar para lista</a>
      </button>
    </form>
  <footer id="footer-placeholder"></footer>
<!--     <script src="/scripts/loadDOM.js"></script>
 -->    <script type="module" src="/scripts/api.js"></script>
</body>
</html>

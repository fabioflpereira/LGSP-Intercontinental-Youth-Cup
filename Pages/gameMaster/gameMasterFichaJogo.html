<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/Pages/gamemaster/css/gamemaster.css" />
    <title>Ficha de Jogo - Game Master</title>
  </head>
  <body>
    <main>
      <h1>Ficha de Jogo</h1>

      <!-- Seleção de jogo -->
      <section>
        <label for="gamesDropdown">Escolha o jogo:</label>
        <select id="gamesDropdown"></select>
      </section>

      
      <section class="teams">
        <div class="team">
          <h3>Equipa A</h3>
          <div id="playersA"></div>
        </div>
        <div class="team">
          <h3>Equipa B</h3>
          <div id="playersB"></div>
        </div>
      </section>

      <!-- Formulário de eventos -->
      <section class="events">
        <h3>Adicionar Evento</h3>
        <form id="eventForm">
          <label for="eventType">Tipo de Evento:</label>
          <select id="eventType">
            <option value="goal">Golo</option>
            <option value="yellow">Amarelo</option>
            <option value="red">Vermelho</option>
          </select>

          <label for="minute">Minuto:</label>
          <input type="number" id="minute" placeholder="Minuto" required />

          <label for="playerSelect">Jogador:</label>
          <select id="playerSelect"></select>

          <button type="submit">Adicionar Evento</button>
        </form>

        <!-- Lista de eventos -->
        <h3>Eventos do Jogo</h3>
        <ul id="eventsList"></ul>
      </section>

      <!-- Controles do jogo -->
      <section class="game-controls">
        <button id="startGameBtn">Iniciar Jogo</button>
        <button id="endGameBtn">Finalizar Jogo</button>
      </section>
    </main>

    <script type="module" src="/scripts/gameMaster.js"></script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/Pages/admin/css/admin.css" />
    <!-- <link rel="stylesheet" href="/style.css"> -->
    <title>EditTeam</title>
  </head>
  <body>
    <header id="header-placeholder"></header>
    <main>
      <h1>Editar Equipa</h1>
      <form id="editTeamForm">
        <label for="teamName">Nome da Equipa:</label>
        <input type="text" id="teamName" name="teamName" required />

        <label for="teamCountry">País da Equipa:</label>
        <input type="text" id="teamCountry" name="teamCountry" required />

        <label for="teamImage">Logo da Equipa:</label>
        <img src="" id="imgTeam" alt="" />
        <input
          type="file"
          accept=".jpg, .jpeg, .png"
          id="teamImage"
          name="teamImage"
        />

        <button type="submit" id="editTeamBtn">Guardar Equipa</button>
        <button type="reset">Reset</button>
      </form>
      <button>
        <a href="/Pages/admin/listTeams.html">Voltar para lista</a>
      </button>
    </main>
    <footer id="footer-placeholder"></footer>
    <!--     <script src="/scripts/loadDOM.js"></script>
 -->
    <script type="module" src="/scripts/api.js"></script>
  </body>
</html>

<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/Pages/admin/css/admin.css" />
    <title>Login</title>
  </head>
  <body>
    <main>
      <h1>Staff</h1>
      <p class="login-subtitle">Aceda com as suas credenciais</p>

      <form class="form" id="loginForm">
        <label for="email">Email:</label>
        <input
          type="email"
          id="email"
          name="email"
          required
          placeholder="seu@email.com"
          autocomplete="email"
        />
        <label for="password">Palavra-passe:</label>
        <input
          type="password"
          id="password"
          name="password"
          rquired
          required
          placeholder="••••••••"
          autocomplete="current-password"
        />
        <button type="submit" class="btn-login" id="loginBtn">Entrar</button>
      </form>
    </main>

    <script type="module" src="/scripts/api.js"></script>
  </body>
</html>

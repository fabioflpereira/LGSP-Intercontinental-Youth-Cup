<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/pages/admin/css/admin.css" />
    <title>Adicionar Evento</title>
  </head>
  <body>
    <header id="header-placeholder"></header>

    <main>
      <button id="logoutBtn">Logout</button>
      <h1>Adicionar Evento</h1>

      <form class="form" id="addEventForm">
        <label for="gamesDropdown">Jogo:</label>
        <select id="gamesDropdown" required></select>

        <label for="teamsDropdown">Equipa:</label>
        <select id="teamsDropdown" required></select>

        <label for="playersDropdown">Jogador:</label>
        <select id="playersDropdown" required></select>

        <label for="eventType">Tipo de Evento:</label>
        <select id="eventType" required>
          <option value="">Seleciona</option>
          <option value="golo">Golo</option>
          <option value="autogolo">Auto-golo</option>
          <option value="cartao amarelo">Cartão Amarelo</option>
          <option value="cartao vermelho">Cartão Vermelho</option>
          <option value="penalty">Penalty</option>
          <option value="penalty falhado">Penalty Falhado</option>
        </select>

        <label for="eventTime">Minuto:</label>
        <input type="number" id="eventTime" min="0" max="60" required />

        <button type="submit">Adicionar Evento</button>
        <button type="reset">Reset</button>
        <button>
          <a href="/pages/admin/listEvents.html">Voltar para lista</a>
        </button>
      </form>
    </main>

    <footer id="footer-placeholder"></footer>

    <script type="module" src="/scripts/api.js"></script>
  </body>
</html>

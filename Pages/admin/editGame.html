<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/Pages/admin/css/admin.css" />
    <title>Editar Jogo</title>
  </head>
  <body>
    <header id="header-placeholder"></header>

    <main>
      <button id="logoutBtn">Logout</button>
      <h1>Editar Jogo</h1>

      <form class="form" id="addGameForm">
        <!-- Equipa Casa -->
        <label for="teamA">Equipa 1:</label>
        <select id="teamA" required></select>

        <!-- Equipa Fora -->
        <label for="teamB">Equipa 2:</label>
        <select id="teamB" required></select>

        <label for="n_jogo">Jogo Número:</label>
        <input type="text" id="n_jogo" required />

        <!-- Status -->
        <label for="status">Estado do Jogo:</label>
        <select id="status">
          <option value="scheduled">Agendado</option>
          <option value="in_progress">A decorrer</option>
          <option value="completed">Finalizado</option>
        </select>

        <!-- Botões -->
        <div>
          <button type="submit">Atualizar Jogo</button>
          <button type="reset">Reset</button>
          <button>
            <a href="/Pages/admin/listGames.html">Voltar para lista</a>
          </button>
        </div>
      </form>
    </main>

    <footer id="footer-placeholder"></footer>

    <script type="module" src="/scripts/api.js"></script>
  </body>
</html>

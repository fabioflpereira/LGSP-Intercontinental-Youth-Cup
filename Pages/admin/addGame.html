<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/Pages/admin/css/admin.css" />
    <title>Adicionar Jogo</title>
  </head>

  <body>
    <header id="header-placeholder"></header>

    <main>
      <button id="logoutBtn">Logout</button>
      <h1>Adicionar Jogo</h1>

      <form id="addGameForm">

        <!-- Equipa Casa -->
        <label for="teamA">Equipa 1:</label>
        <select id="teamA" required></select>

        <!-- Equipa Fora -->
        <label for="teamB">Equipa 2:</label>
        <select id="teamB" required></select>

        <!-- Status -->
        <label for="status">Estado do Jogo:</label>
        <select id="status">
          <option value="scheduled">Agendado</option>
          <option value="in_progress">A decorrer</option>
          <option value="completed">Finalizado</option>
        </select>

        <!-- Botões -->
        <div style="margin-top:10px;">
          <button type="submit">Adicionar Jogo</button>
          <button type="reset">Reset</button>
          <a href="/Pages/admin/listGames.html">
            <button type="button">Voltar para a lista</button>
          </a>
        </div>

      </form>
    </main>

    <footer id="footer-placeholder"></footer>

    <script type="module" src="/scripts/api.js"></script>
  </body>
</html>

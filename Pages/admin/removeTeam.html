<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remover Equipa</title>
</head>
<body>

<header id="header-placeholder"></header>

<main>
    <h1>Remover Equipa</h1>

    <ul id="teamList"></ul>
</main>

<footer id="footer-placeholder"></footer>

<script type="module">
    import { teamAPI } from "/scripts/api.js";

    document.addEventListener("DOMContentLoaded", () => {
        // Garante que corre apenas nesta página
        if (!window.location.pathname.toLowerCase().includes("removeteam.html")) return;

        teamAPI.getAll().then((teams) => {
            const teamList = document.getElementById("teamList");
            teamList.innerHTML = "";

            teams.forEach((team) => {
                teamList.innerHTML += `
                    <li>
                        ${team.name} (${team.country})
                        <button class="deleteTeamBtn" data-id="${team._id}" 
                                style="background:red; color:white; margin-left:10px;">
                            Eliminar
                        </button>
                    </li>
                `;
            });

            // Atribuir eventos
            document.querySelectorAll(".deleteTeamBtn").forEach(btn => {
                btn.addEventListener("click", () => {
                    const id = btn.dataset.id;

                    if (!confirm("Tem a certeza que quer eliminar esta equipa?")) return;

                    teamAPI.delete(id)
                        .then(() => {
                            alert("Equipa removida com sucesso!");
                            window.location.reload();
                        })
                        .catch(err => console.error("Erro ao eliminar equipa:", err));
                });
            });
        });
    });
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/style.css">
    <title>AddTeam</title>
</head>
<body>
    <header id="header-placeholder"></header>
    <main>
        <h1>Adicionar Equipa</h1>
        <form id="addTeamForm">
            <label for="teamName">Nome da Equipa:</label>
            <input type="text" id="teamName" name="teamName" required><br><br>

            <label for="teamCountry">País da Equipa:</label>
            <input type="text" id="teamCountry" name="teamCountry" required><br><br>

            <label for="teamImage">Logo da Equipa:</label>
            <input type="file" accept=".jpg, .jpeg, .png" id="teamImage" name="teamImage"><br><br>

            <button type="submit" id="addTeamBtn">Adicionar Equipa</button>
        </form>
    </main>
    <footer id="footer-placeholder"></footer>
    <script src="/scripts/loadDOM.js"></script>
    <script type="module" src="/scripts/api.js"></script>
</body>
</html>
